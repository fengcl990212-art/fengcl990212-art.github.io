<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="Trajectory planning via global probabilistic learning from expert demonstrations">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbfbfc"/>
      <stop offset="100%" stop-color="#f3f6fa"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f7f9fc"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4a4a4a"/>
    </marker>
    <marker id="arrowPurple" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7e4b9e"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#76889c" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <text x="72" y="78" fill="#17314f" font-family="Arial, Microsoft YaHei, sans-serif" font-size="34" font-weight="700">Global probabilistic learning from expert demonstrations</text>
  <text x="72" y="112" fill="#61788b" font-family="Arial, Microsoft YaHei, sans-serif" font-size="18">Expert demonstration capture, GMMP adaptation and guided trajectory optimization</text>

  <g filter="url(#shadow)">
    <rect x="70" y="160" width="1460" height="650" rx="28" fill="url(#panel)" stroke="#d8e2eb"/>
  </g>

  <text x="116" y="824" fill="#111" font-family="Arial, Microsoft YaHei, sans-serif" font-size="28">(a) Expert skill capture and global probabilistic learning</text>

  <g transform="translate(96,198)">
    <rect x="0" y="0" width="1410" height="560" rx="18" fill="#ffffff" stroke="#d9e1e8"/>
    <g stroke="#d0d7de" stroke-width="1">
      <path d="M24 92H1386M24 188H1386M24 284H1386M24 380H1386M24 476H1386"/>
    </g>

    <text x="40" y="52" fill="#7e4b9e" font-size="22" font-weight="700" font-family="Arial, Microsoft YaHei, sans-serif">a. Expert skill capture</text>
    <text x="510" y="52" fill="#7e4b9e" font-size="22" font-weight="700" font-family="Arial, Microsoft YaHei, sans-serif">b. GMMP model adaptation</text>
    <text x="1050" y="52" fill="#7e4b9e" font-size="22" font-weight="700" font-family="Arial, Microsoft YaHei, sans-serif">c. Guided model predictive path integral</text>

    <g>
      <rect x="28" y="70" width="420" height="460" rx="14" fill="#f9f9fb" stroke="#d5dbe3"/>
      <text x="40" y="104" fill="#4c4c4c" font-size="18" font-weight="700" font-family="Arial, Microsoft YaHei, sans-serif">Signal capture</text>
      <rect x="44" y="126" width="186" height="168" rx="10" fill="#ffffff" stroke="#cad4de"/>
      <path d="M72 262 L98 220 L138 236 L168 204 L204 222" fill="none" stroke="#7e4b9e" stroke-width="3"/>
      <circle cx="72" cy="262" r="6" fill="#7e4b9e"/><circle cx="98" cy="220" r="6" fill="#7e4b9e"/><circle cx="138" cy="236" r="6" fill="#7e4b9e"/><circle cx="168" cy="204" r="6" fill="#7e4b9e"/><circle cx="204" cy="222" r="6" fill="#7e4b9e"/>
      <text x="138" y="318" fill="#4c4c4c" font-size="14" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif">position / orientation signals</text>
      <rect x="250" y="126" width="170" height="168" rx="10" fill="#ffffff" stroke="#cad4de"/>
      <text x="335" y="160" fill="#4c4c4c" font-size="18" font-weight="700" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif">Motion mapping</text>
      <text x="335" y="206" fill="#4c4c4c" font-size="16" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif">f : R^n -> SE(3)</text>
      <text x="335" y="240" fill="#4c4c4c" font-size="16" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif">time alignment</text>
      <text x="335" y="274" fill="#4c4c4c" font-size="16" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif">data filtering</text>
      <path d="M235 210 H250" stroke="#7e4b9e" stroke-width="3" marker-end="url(#arrowPurple)"/>
      <rect x="44" y="326" width="376" height="184" rx="10" fill="#ffffff" stroke="#cad4de"/>
      <text x="232" y="356" fill="#4c4c4c" font-size="18" font-weight="700" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif">Excavator demonstration</text>
      <path d="M68 458 C124 380, 170 402, 226 350 S334 288, 382 338" stroke="#7e4b9e" stroke-width="4" fill="none"/>
      <path d="M72 442 C128 372, 172 390, 228 340 S330 282, 382 326" stroke="#b88fcf" stroke-width="2" fill="none" stroke-dasharray="5 6"/>
      <circle cx="68" cy="458" r="5" fill="#7e4b9e"/><circle cx="226" cy="350" r="5" fill="#7e4b9e"/><circle cx="382" cy="338" r="5" fill="#7e4b9e"/>
      <text x="232" y="490" fill="#4c4c4c" font-size="14" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif">expert trajectory set in SE(3)</text>
    </g>

    <g>
      <rect x="468" y="70" width="410" height="460" rx="14" fill="#f9f9fb" stroke="#d5dbe3"/>
      <text x="484" y="104" fill="#4c4c4c" font-size="18" font-weight="700" font-family="Arial, Microsoft YaHei, sans-serif">Global Modulated Movement Primitive (GMMP)</text>
      <rect x="496" y="126" width="354" height="96" rx="10" fill="#ffffff" stroke="#cad4de"/>
      <text x="674" y="160" fill="#4c4c4c" font-size="17" font-weight="700" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif">SE(3) trajectory mean</text>
      <text x="674" y="190" fill="#4c4c4c" font-size="15" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif">global evolution model of demonstrations</text>
      <path d="M510 200 C572 170, 610 168, 674 160 S776 154, 832 132" stroke="#7e4b9e" stroke-width="3" fill="none"/>
      <path d="M510 186 C572 160, 612 158, 674 150 S774 144, 832 124" stroke="#b88fcf" stroke-width="2" fill="none" stroke-dasharray="5 6"/>
      <rect x="496" y="246" width="160" height="106" rx="10" fill="#ffffff" stroke="#cad4de"/>
      <text x="576" y="280" fill="#4c4c4c" font-size="16" font-weight="700" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif">New via-point</text>
      <text x="576" y="306" fill="#4c4c4c" font-size="14" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif">Bayesian update</text>
      <text x="576" y="330" fill="#4c4c4c" font-size="14" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif">task adaptation</text>
      <rect x="680" y="246" width="170" height="106" rx="10" fill="#ffffff" stroke="#cad4de"/>
      <text x="765" y="280" fill="#4c4c4c" font-size="16" font-weight="700" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif">Workspace density</text>
      <text x="765" y="306" fill="#4c4c4c" font-size="14" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif">cross-platform transfer</text>
      <text x="765" y="330" fill="#4c4c4c" font-size="14" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif">without retraining</text>
      <rect x="496" y="378" width="354" height="118" rx="10" fill="#ffffff" stroke="#cad4de"/>
      <text x="674" y="414" fill="#4c4c4c" font-size="16" font-weight="700" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif">Global probability density</text>
      <text x="674" y="442" fill="#4c4c4c" font-size="15" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif">p(S1, S2, ..., Sn)</text>
      <path d="M674 352 V378" stroke="#7e4b9e" stroke-width="3" marker-end="url(#arrowPurple)"/>
    </g>

    <g>
      <rect x="904" y="70" width="478" height="460" rx="14" fill="#f9f9fb" stroke="#d5dbe3"/>
      <text x="920" y="104" fill="#4c4c4c" font-size="18" font-weight="700" font-family="Arial, Microsoft YaHei, sans-serif">Guided model predictive path integral</text>
      <rect x="940" y="126" width="404" height="60" rx="10" fill="#ffffff" stroke="#cad4de"/>
      <text x="1142" y="163" fill="#4c4c4c" font-size="18" font-weight="700" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif">GMMP generated trajectory</text>
      <path d="M1142 186 V222" stroke="#4a4a4a" stroke-width="3" marker-end="url(#arrow)"/>
      <rect x="940" y="228" width="404" height="66" rx="10" fill="#ffffff" stroke="#cad4de"/>
      <text x="1142" y="268" fill="#4c4c4c" font-size="18" font-weight="700" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif">Control input sampling</text>
      <path d="M1142 294 V328" stroke="#4a4a4a" stroke-width="3" marker-end="url(#arrow)"/>
      <rect x="940" y="336" width="404" height="104" rx="10" fill="#ffffff" stroke="#cad4de"/>
      <text x="1142" y="364" fill="#4c4c4c" font-size="17" font-weight="700" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif">Loss function</text>
      <text x="1142" y="392" fill="#4c4c4c" font-size="14" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif">SE(3) consistency constraint</text>
      <text x="1142" y="414" fill="#4c4c4c" font-size="14" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif">joint-state constraint</text>
      <text x="1142" y="436" fill="#4c4c4c" font-size="14" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif">environment constraint</text>
      <path d="M1142 440 V480" stroke="#4a4a4a" stroke-width="3" marker-end="url(#arrow)"/>
      <rect x="940" y="488" width="404" height="54" rx="10" fill="#7e4b9e" opacity="0.08" stroke="#7e4b9e"/>
      <text x="1142" y="522" fill="#7e4b9e" font-size="19" font-weight="700" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif">Optimal control input</text>
    </g>

    <rect x="520" y="544" width="364" height="22" rx="11" fill="#7e4b9e" opacity="0.12"/>
    <text x="702" y="560" fill="#7e4b9e" font-size="18" font-weight="700" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif">GMMP model adaptation and planning</text>
  </g>
</svg>
