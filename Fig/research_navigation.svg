        <text x="51" y="24" fill="#17314f" font-size="14" font-weight="700" text-anchor="middle">Legend</text>
        <rect x="14" y="36" width="18" height="18" fill="#5aa9ff"/><text x="40" y="51" fill="#4b5560" font-size="13">low cost</text>
        <rect x="14" y="58" width="18" height="18" fill="#f7d37b"/><text x="40" y="73" fill="#4b5560" font-size="13">mid cost</text>
        <rect x="14" y="80" width="18" height="18" fill="#ef6f63"/><text x="40" y="95" fill="#4b5560" font-size="13">high cost</text>
        <rect x="14" y="102" width="18" height="10" fill="#3b4650"/><text x="40" y="111" fill="#4b5560" font-size="13">obstacle</text>
      </g>

      <text x="20" y="456" fill="#60788d" font-size="14">Traversability cost derived from terrain observation</text>
    </g>

    <!-- Panel B -->
    <g transform="translate(595,252)">
      <rect x="0" y="0" width="410" height="470" rx="16" fill="#f8fbfe" stroke="#e3e9ef"/>
      <g opacity="0.85" stroke="#e7edf3" stroke-width="1">
