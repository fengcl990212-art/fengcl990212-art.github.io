        <rect x="0" y="110" width="82" height="12" fill="#d9dee5"/>
        <text x="41" y="146" fill="#60788d" font-size="13" text-anchor="middle">too steep</text>
      </g>

      <g transform="translate(162,164)">
        <path d="M8 92 C26 74, 34 54, 56 42 S88 22, 94 8" fill="none" stroke="#8b96a3" stroke-width="3"/>
        <circle cx="58" cy="42" r="12" fill="#3b4650"/>
        <circle cx="84" cy="18" r="12" fill="#3b4650"/>
        <rect x="34" y="62" width="50" height="20" rx="6" fill="#1f78d1"/>
        <circle cx="38" cy="94" r="7" fill="#3b4650"/>
        <circle cx="72" cy="94" r="7" fill="#3b4650"/>
        <circle cx="52" cy="60" r="20" fill="none" stroke="#ef6f63" stroke-width="4"/>
        <text x="60" y="146" fill="#60788d" font-size="13" text-anchor="middle">collision risk</text>
      </g>

      <g transform="translate(284,160)">
        <path d="M10 86 C32 76, 52 60, 74 42 S106 16, 108 8" fill="none" stroke="#16a34a" stroke-width="4" marker-end="url(#arrowGreen)"/>
        <path d="M10 86 C32 68, 50 56, 66 48 S96 24, 108 8" fill="none" stroke="#8bbf98" stroke-width="2" stroke-dasharray="5 6"/>
        <circle cx="40" cy="64" r="7" fill="#3b4650"/>
        <circle cx="66" cy="48" r="7" fill="#3b4650"/>
        <circle cx="92" cy="24" r="7" fill="#3b4650"/>
        <text x="56" y="146" fill="#60788d" font-size="13" text-anchor="middle">feasible</text>
      </g>

      <g transform="translate(32,348)">
        <rect x="0" y="0" width="350" height="76" rx="12" fill="#f4f9fd" stroke="#dbe3eb"/>
        <text x="175" y="28" fill="#17314f" font-size="15" font-weight="700" text-anchor="middle">Feasible candidates retained</text>
        <text x="175" y="51" fill="#60788d" font-size="12.5" text-anchor="middle">invalid samples removed by constraints</text>
      </g>
    </g>

    <!-- Panel C -->
    <g transform="translate(1072,252)">
      <rect x="0" y="0" width="410" height="470" rx="16" fill="#f8fbfe" stroke="#e3e9ef"/>
      <rect x="18" y="18" width="374" height="352" rx="14" fill="#ffffff" stroke="#dbe3eb"/>
      <g opacity="0.9" stroke="#edf1f5" stroke-width="1">
