<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="Constraint-aware motion planning for vehicles">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbfbfc"/>
      <stop offset="100%" stop-color="#f3f7fb"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f7fafc"/>
    </linearGradient>
    <linearGradient id="terrainA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d7efff"/>
      <stop offset="40%" stop-color="#9ed2ff"/>
      <stop offset="70%" stop-color="#ffd88c"/>
      <stop offset="100%" stop-color="#ef6f63"/>
    </linearGradient>
    <linearGradient id="terrainB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef3f8"/>
      <stop offset="100%" stop-color="#cfd8e3"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#203040"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#148a4b"/>
    </marker>
    <marker id="arrowMagenta" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d116a4"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#72849a" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <text x="72" y="78" fill="#17314f" font-family="Arial, Microsoft YaHei, sans-serif" font-size="34" font-weight="700">Constraint-aware motion planning for vehicles</text>
  <text x="72" y="112" fill="#60798e" font-family="Arial, Microsoft YaHei, sans-serif" font-size="18">Terrain traversability assessment, constraint checking and optimized path generation</text>

  <g filter="url(#shadow)">
    <rect x="70" y="160" width="1460" height="660" rx="28" fill="url(#panel)" stroke="#d8e2eb"/>
  </g>

  <g font-family="Arial, Microsoft YaHei, sans-serif">
