    <rect x="575" y="192" width="450" height="560" rx="20" fill="#ffffff" stroke="#dbe3eb"/>
    <rect x="1052" y="192" width="450" height="560" rx="20" fill="#ffffff" stroke="#dbe3eb"/>

    <text x="122" y="228" fill="#7a4aa0" font-size="22" font-weight="700">A  Terrain traversability map</text>
    <text x="599" y="228" fill="#7a4aa0" font-size="22" font-weight="700">B  Constraint-aware search</text>
    <text x="1076" y="228" fill="#7a4aa0" font-size="22" font-weight="700">C  Optimized trajectory</text>

    <!-- Panel A -->
    <g transform="translate(118,252)">
      <rect x="0" y="0" width="410" height="470" rx="16" fill="#f8fbfe" stroke="#e3e9ef"/>
      <g opacity="0.95" stroke="#e7edf3" stroke-width="1">
