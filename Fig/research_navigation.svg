        <circle cx="110" cy="124" r="10" fill="#53626f"/>
        <circle cx="238" cy="86" r="10" fill="#53626f"/>
        <circle cx="316" cy="186" r="10" fill="#53626f"/>
        <circle cx="176" cy="278" r="10" fill="#53626f"/>
