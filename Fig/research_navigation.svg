      <circle cx="58" cy="330" r="10" fill="#1f78d1"/>
      <text x="58" y="354" fill="#17314f" font-size="14" font-weight="700" text-anchor="middle">Start</text>
      <circle cx="366" cy="54" r="10" fill="#16a34a"/>
      <text x="366" y="42" fill="#17314f" font-size="14" font-weight="700" text-anchor="middle">Goal</text>

      <path d="M58 330 C104 296, 128 288, 164 254 S228 180, 262 156 S318 86, 366 54" fill="none" stroke="#d116a4" stroke-width="6" marker-end="url(#arrowMagenta)"/>
      <path d="M60 328 C106 288, 132 280, 170 246 S232 176, 266 150 S322 84, 366 54" fill="none" stroke="#f0a3d6" stroke-width="3" stroke-dasharray="8 8"/>

      <g fill="#d116a4">
        <circle cx="58" cy="330" r="5"/>
        <circle cx="114" cy="288" r="5"/>
        <circle cx="168" cy="244" r="5"/>
        <circle cx="220" cy="190" r="5"/>
        <circle cx="272" cy="142" r="5"/>
        <circle cx="326" cy="88" r="5"/>
        <circle cx="366" cy="54" r="5"/>
      </g>

      <g transform="translate(22,384)">
        <rect x="0" y="0" width="374" height="40" rx="12" fill="#ffffff" stroke="#dbe3eb"/>
        <text x="187" y="26" fill="#17314f" font-size="15" font-weight="700" text-anchor="middle">Collision-free optimized path</text>
      </g>
      <g transform="translate(22,434)">
        <rect x="0" y="0" width="374" height="18" rx="9" fill="#f4f9fd" stroke="#dbe3eb"/>
        <path d="M14 9 H74" stroke="#1f78d1" stroke-width="4" stroke-linecap="round"/>
        <text x="96" y="13" fill="#60788d" font-size="13">search seed</text>
        <path d="M228 9 H288" stroke="#d116a4" stroke-width="4" stroke-linecap="round"/>
        <text x="310" y="13" fill="#60788d" font-size="13">optimized path</text>
      </g>
