        <path d="M22 196 C74 168, 122 172, 170 150 S276 128, 334 148 S388 196, 388 196 L388 244 L22 244 Z" opacity="0.82"/>
        <path d="M22 292 C74 270, 124 270, 176 246 S286 214, 338 236 S388 286, 388 286 L388 332 L22 332 Z" opacity="0.74"/>
      </g>

      <g opacity="0.55" fill="#3b4650">
