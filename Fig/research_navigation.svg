        <rect x="258" y="66" width="48" height="48" fill="#f1bb7d"/>
        <rect x="306" y="66" width="48" height="48" fill="#eea56c"/>
        <rect x="354" y="66" width="48" height="48" fill="#e98f64"/>
        <rect x="18" y="114" width="48" height="48" fill="#e7f4ff"/>
        <rect x="66" y="114" width="48" height="48" fill="#eaf6e8"/>
        <rect x="114" y="114" width="48" height="48" fill="#fff4bf"/>
        <rect x="162" y="114" width="48" height="48" fill="#ffdd96"/>
        <rect x="210" y="114" width="48" height="48" fill="#ffc46f"/>
        <rect x="258" y="114" width="48" height="48" fill="#ffab5b"/>
        <rect x="306" y="114" width="48" height="48" fill="#ff8f57"/>
        <rect x="354" y="114" width="48" height="48" fill="#ef6f63"/>
        <rect x="18" y="162" width="48" height="48" fill="#eef6ff"/>
        <rect x="66" y="162" width="48" height="48" fill="#f0faeb"/>
        <rect x="114" y="162" width="48" height="48" fill="#f4f7d9"/>
        <rect x="162" y="162" width="48" height="48" fill="#f9e9b5"/>
        <rect x="210" y="162" width="48" height="48" fill="#f4cf8c"/>
        <rect x="258" y="162" width="48" height="48" fill="#ecb373"/>
        <rect x="306" y="162" width="48" height="48" fill="#e89467"/>
        <rect x="354" y="162" width="48" height="48" fill="#e67162"/>
