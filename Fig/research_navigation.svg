      <g transform="translate(50,344)">
        <rect x="0" y="0" width="84" height="36" rx="10" fill="#1f78d1"/>
        <rect x="14" y="-18" width="52" height="20" rx="6" fill="#6ec0ff"/>
        <circle cx="16" cy="38" r="8" fill="#404954"/>
        <circle cx="68" cy="38" r="8" fill="#404954"/>
        <path d="M84 18 L120 18" stroke="#1f78d1" stroke-width="6" marker-end="url(#arrow)"/>
