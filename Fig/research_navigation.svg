        <path d="M62 18V452M110 18V452M158 18V452M206 18V452M254 18V452M302 18V452M350 18V452"/>
      </g>
      <g>
        <rect x="18" y="18" width="48" height="48" fill="#d9f0ff"/>
        <rect x="66" y="18" width="48" height="48" fill="#bfe1ff"/>
        <rect x="114" y="18" width="48" height="48" fill="#a6d2ff"/>
