<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全国机械工程学科博士生论坛报告 | 冯晨龙</title>
    <style>
        :root {
            --bg: #f3f5f7;
            --surface: #ffffff;
            --line: #d6dde5;
            --ink: #1f2937;
            --muted: #5f6b7a;
            --accent: #2f5e89;
            --accent-soft: #e8f0f7;
            --shadow: 0 18px 40px rgba(21, 37, 53, 0.08);
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            background: var(--bg);
            color: var(--ink);
            font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
            line-height: 1.8;
        }

        a { color: inherit; text-decoration: none; }
        .topbar {
            border-bottom: 1px solid var(--line);
            background: rgba(243, 245, 247, 0.94);
            backdrop-filter: blur(12px);
        }

        .topbar-inner, .page, .footer {
            width: min(980px, calc(100% - 40px));
            margin: 0 auto;
        }

        .topbar-inner {
            min-height: 62px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            font-size: 14px;
        }

        .back-link { color: var(--accent); font-weight: 700; }
        .page { padding: 34px 0 48px; }

        .article {
            overflow: hidden;
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 22px;
            box-shadow: var(--shadow);
        }

        .hero img { width: 100%; height: auto; display: block; }
        .content { padding: 26px 28px 30px; }

        .tag {
            display: inline-flex;
            align-items: center;
            padding: 6px 12px;
            border-radius: 999px;
            background: var(--accent-soft);
            color: var(--accent);
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 16px;
        }

        h1 { margin: 0 0 10px; font-size: clamp(28px, 4vw, 38px); line-height: 1.3; }
        .meta {
            display: flex;
            flex-wrap: wrap;
            gap: 10px 14px;
            margin-bottom: 18px;
            color: var(--muted);
            font-size: 14px;
        }

        p { margin: 0 0 16px; font-size: 15px; }
        .button-row { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 20px; }
        .button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 42px;
            padding: 10px 16px;
            border-radius: 999px;
            border: 1px solid var(--line);
            background: var(--surface);
            font-size: 14px;
            font-weight: 700;
        }

        .footer { margin-top: 26px; color: var(--muted); font-size: 13px; }

        @media (max-width: 640px) {
            .topbar-inner, .page, .footer { width: calc(100% - 28px); }
            .content { padding: 20px 16px 24px; }
        }
    </style>
</head>
<body>
    <header class="topbar">
        <div class="topbar-inner">
            <a class="back-link" href="../../index.html#news">返回主页动态区</a>
            <div>学术动态详情</div>
        </div>
    </header>

    <main class="page">
        <article class="article">
            <!-- <div class="hero">
                <img src="../../Fig/Fig11_1920x1080.png" alt="博士生论坛报告图片">
            </div> -->
            <div class="content">
                <div class="tag">论坛报告</div>
                <h1>第九届全国机械工程学科博士生论坛报告并获二等奖</h1>
                <div class="meta">
                    <span>时间：2024年12月</span>
                    <span>地点：徐州</span>
                    <span>成果：二等奖</span>
                </div>

                <p>
                    本次论坛报告题目为“融合物理嵌入网络的挖掘机动力学建模及精确控制方法研究”，重点介绍面向精准作业场景的挖掘机动力学建模、非线性特征学习和精确控制方法。
                </p>
                <p>
                    汇报内容系统呈现了从研究背景、技术路线到仿真与实验验证的完整流程，展示了机理模型与数据驱动方法融合在工程装备精准控制中的应用价值。
                </p>

                <div class="button-row">
                    <a class="button" href="../news.html">返回动态归档</a>
                </div>
            </div>
        </article>
    </main>

    <div class="footer">© 2026 冯晨龙。</div>
</body>
</html>
