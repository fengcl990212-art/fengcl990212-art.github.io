<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>国际智能机器人与系统会议海报展示 | 冯晨龙</title>
    <style>
        :root {
            --bg: #f3f5f7;
            --surface: #ffffff;
            --line: #d6dde5;
            --ink: #1f2937;
            --muted: #5f6b7a;
            --accent: #2f5e89;
            --accent-soft: #e8f0f7;
            --shadow: 0 18px 40px rgba(21, 37, 53, 0.08);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--ink);
            font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
            line-height: 1.8;
        }

        a { color: inherit; text-decoration: none; }

        .topbar {
            border-bottom: 1px solid var(--line);
            background: rgba(243, 245, 247, 0.94);
            backdrop-filter: blur(12px);
        }

        .topbar-inner,
        .page,
        .footer {
            width: min(980px, calc(100% - 40px));
            margin: 0 auto;
        }

        .topbar-inner {
            min-height: 62px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            font-size: 14px;
        }

        .back-link { color: var(--accent); font-weight: 700; }

        .page { padding: 34px 0 48px; }

        .article {
            overflow: hidden;
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 22px;
            box-shadow: var(--shadow);
        }

        .hero {
            min-height: 240px;
            display: grid;
            align-items: end;
            padding: 24px;
            background:
                linear-gradient(180deg, rgba(47, 94, 137, 0.92), rgba(25, 53, 79, 0.95)),
                radial-gradient(circle at top right, rgba(232, 239, 246, 0.18), transparent 42%);
            color: #ffffff;
        }

        .hero-kicker {
            display: inline-flex;
            align-items: center;
            padding: 6px 12px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.18);
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 14px;
        }

        .hero h1 {
            margin: 0;
            font-size: clamp(28px, 4vw, 40px);
            line-height: 1.22;
        }

        .content { padding: 26px 28px 30px; }

        .tag {
            display: inline-flex;
            align-items: center;
            padding: 6px 12px;
            border-radius: 999px;
            background: var(--accent-soft);
            color: var(--accent);
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 16px;
        }

        .meta {
            display: flex;
            flex-wrap: wrap;
            gap: 10px 14px;
            margin-bottom: 18px;
            color: var(--muted);
            font-size: 14px;
        }

        p {
            margin: 0 0 16px;
            font-size: 15px;
        }

        .section-title {
            margin: 26px 0 10px;
            font-size: 18px;
        }

        .button-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 20px;
        }

        .button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 42px;
            padding: 10px 16px;
            border-radius: 999px;
            border: 1px solid var(--line);
            background: var(--surface);
            font-size: 14px;
            font-weight: 700;
        }

        .button-primary {
            background: var(--accent);
            border-color: var(--accent);
            color: #ffffff;
        }

        .button-primary:hover,
        .button-primary:focus-visible {
            background: #244a6c;
            border-color: #244a6c;
        }

        .footer {
            margin-top: 26px;
            color: var(--muted);
            font-size: 13px;
        }

        @media (max-width: 640px) {
            .topbar-inner,
            .page,
            .footer {
                width: calc(100% - 28px);
            }

            .hero {
                min-height: 190px;
                padding: 20px;
            }

            .content {
                padding: 20px 16px 24px;
            }
        }
    </style>
</head>
<body>
    <header class="topbar">
        <div class="topbar-inner">
            <a class="back-link" href="../../index.html#news">返回动态归档</a>
            <div>学术动态详情</div>
        </div>
    </header>

    <main class="page">
        <article class="article">
            <div class="hero">
                <div>
                    <div class="hero-kicker">海报展示 · 上海</div>
                    <h1>国际智能机器人与系统会议海报展示</h1>
                </div>
            </div>

            <div class="content">
                <div class="tag">2025年10月</div>
                <div class="meta">
                    <span>时间：2025年10月</span>
                    <span>地点：上海</span>
                    <span>形式：海报展示</span>
                </div>

                <p>
                    本次展示围绕施工场景中融合地形可穿越性评估的约束感知车辆运动规划展开，重点介绍复杂地形下车辆运动规划所面临的安全性、平稳性和动力学可行性问题
                </p>
                <p>
                    研究方法从地形可穿越性评估、可行路径搜索到轨迹优化三个层面建立完整规划流程，形成适用于复杂施工环境的车辆自主导航方案
                </p>

                <h2 class="section-title">相关材料</h2>
                <p>已保留与该次展示相关的材料，可直接查看</p>

                <div class="button-row">
                    <a class="button button-primary" href="../../file/pdf/IROS_Workshop.pdf" target="_blank" rel="noopener noreferrer">下载PDF</a>
                    <a class="button" href="../news.html">返回动态归档</a>
                </div>
            </div>
        </article>
    </main>

    <div class="footer">© 2026 冯晨龙</div>
    <script src="../../js/visit-tracker.js"></script>
</body>
</html>
